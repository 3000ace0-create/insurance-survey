<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보험 설문</title>
<style>
body { font-family: sans-serif; padding:20px; max-width:500px; margin:auto; }
h2 { margin-bottom:10px; }
.section { margin-bottom:25px; }
button { padding:10px; width:100%; margin-top:10px; }
.hidden { display:none; }
.progress { font-size:14px; color:gray; margin-bottom:10px; }
</style>
</head>

<body>

<h2>간단 설문</h2>
<div style="font-size:14px; margin-bottom:20px;">
약 5분 소요 · 맞춤 상담을 위한 사전 확인입니다
</div>

<div class="progress" id="progress">1/2 단계 진행 중</div>

<!-- STEP 1 -->
<div id="step1">

<div class="section">
<p>현재 보험 상태는?</p>
<select id="insurance">
<option>없음</option>
<option>일부 있음</option>
<option>잘 모르겠음</option>
<option>충분히 있음</option>
</select>
</div>

<div class="section">
<p>가장 궁금한 것은?</p>
<select id="interest">
<option>보험 점검</option>
<option>보장 부족</option>
<option>보험료 절감</option>
<option>노후/연금</option>
<option>상속/절세</option>
</select>
</div>

<div class="section">
<p>연령대</p>
<select id="age">
<option>20대</option>
<option>30대</option>
<option>40대</option>
<option>50대 이상</option>
</select>
</div>

<div class="section">
<p>가족 상황</p>
<select id="family">
<option>미혼</option>
<option>기혼</option>
<option>자녀 있음</option>
</select>
</div>

<button onclick="nextStep()">다음</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">

<div style="font-size:14px; color:gray; margin-bottom:15px;">
추가 입력 시 더 정확한 상담이 가능합니다 (선택)
</div>

<div class="section">
<p>월 소득 (대략)</p>
<select id="income">
<option>300 이하</option>
<option>300~500</option>
<option>500~700</option>
<option>700 이상</option>
</select>
</div>

<div class="section">
<p>가장 걱정되는 것</p>
<select id="concern">
<option>의료비</option>
<option>사망보장</option>
<option>노후</option>
<option>보험료 부담</option>
<option>잘 모르겠음</option>
</select>
</div>

<div class="section">
<p>추가로 궁금한 점</p>
<input type="text" id="extra" placeholder="자유롭게 입력">
</div>

<button onclick="submitForm()">제출하기</button>

</div>

<!-- 결과 -->
<div id="result" class="hidden"></div>

<script>

function nextStep() {
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
  document.getElementById("progress").innerText = "2/2 단계 진행 중";
}

function getCustomerType(data) {
  if (data.concern === "보험료 부담") return "효율형";
  if (data.concern === "의료비" || data.concern === "노후") return "불안형";
  if (data.interest === "상속/절세" || data.interest === "노후/연금") return "준비형";
  return "방치형";
}

function submitForm() {

  const data = {
    insurance: document.getElementById("insurance").value,
    interest: document.getElementById("interest").value,
    age: document.getElementById("age").value,
    family: document.getElementById("family").value,
    income: document.getElementById("income").value,
    concern: document.getElementById("concern").value,
    extra: document.getElementById("extra").value
  };

  const type = getCustomerType(data);

  let message = "";

  if (type === "효율형") {
    message = "보험료 최적화 중심으로 상담을 준비하겠습니다.";
  } else if (type === "불안형") {
    message = "걱정되는 보장부터 우선 정리해드리겠습니다.";
  } else if (type === "준비형") {
    message = "중장기 설계 중심으로 구조를 잡아드리겠습니다.";
  } else {
    message = "전체 보장 점검 중심으로 빠르게 정리해드리겠습니다.";
  }

  document.getElementById("step2").classList.add("hidden");
  const resultDiv = document.getElementById("result");
  resultDiv.classList.remove("hidden");

  resultDiv.innerHTML = `
    <h3>설문 완료</h3>
    <p>${message}</p>
    <p style="font-size:13px; color:gray;">
    상담 시 더 자세히 안내드리겠습니다 😊
    </p>
  `;
}

</script>

</body>
</html>
